<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Gestión Profesional</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        h2 { text-align: center; color: var(--text); margin-bottom: 30px; font-weight: 700; }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h3 { margin-top: 0; margin-bottom: 20px; font-size: 1.25rem; color: var(--primary); }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary); }

        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover { background: var(--primary-hover); }

        .busqueda-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-buscar { width: auto; padding: 0 20px; background: #64748b; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; }
        th { background-color: #f1f5f9; padding: 15px; text-align: left; font-size: 0.9rem; color: #64748b; }
        th:first-child { border-top-left-radius: 8px; }
        th:last-child { border-top-right-radius: 8px; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Gestión de Inventario</h2>
    
    <div class="card">
        <h3>Registrar Nuevo Producto</h3>
        <form id="formProducto">
            <input type="text" id="nombre" placeholder="Nombre del producto" required>
            <input type="number" id="precio" placeholder="Precio ($)" required>
            <input type="number" id="existencia" placeholder="Unidades en stock" required>
            <button type="submit">Agregar al Inventario</button>
        </form>
    </div>

    <div class="card">
        <h3>Lista de Inventario</h3>
        <div class="busqueda-container">
            <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="if(event.key === 'Enter') filtrarProductos()">
            <button class="btn-buscar" onclick="filtrarProductos()">Filtrar</button>
        </div>
        
        <table>
            <thead>
                <tr><th>Artículo</th><th>Precio</th><th>Stock</th><th>Acción</th></tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
